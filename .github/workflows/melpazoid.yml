# melpazoid <https://github.com/riscy/melpazoid> build checks.

name: melpazoid
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MISE_YES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Cache mise installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise/installs
          key: mise-${{ runner.arch }}-bun
      - name: Install mise and tools
        env:
          GITHUB_TOKEN: ""
        run: |
          curl https://mise.run | sh
          mise use -g bun@latest
          mise install
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.arch }}-
      - name: Install Emacs 30
        uses: purcell/setup-emacs@master
        with:
          version: "30.1"
      - name: Install Melpazoid
        run: |
          python -m pip install --upgrade pip
          emacs --version
          git clone https://github.com/riscy/melpazoid.git ~/melpazoid
          pip install ~/melpazoid
      - name: Install project dependencies
        run: bun install
      - name: Check
        run: bun run check
      - name: Test
        run: bun run test:all
      - name: Run Melpazoid
        run: |
          RECIPE="$(tr '\n' ' ' < vcupp.recipe)"
          export LOCAL_REPO="${{ github.workspace }}"
          export RECIPE
          export EXIST_OK=true
          echo "$GITHUB_REF"
          make -C ~/melpazoid
